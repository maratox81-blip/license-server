<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>License Server — Вход</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #1a1a24;
    border: 1px solid #2d2d3d;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 12px;
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .logo p {
    font-size: 13px;
    color: #64748b;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #94a3b8;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    background: #0f0f13;
    border: 1px solid #2d2d3d;
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="password"]:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }

  .btn {
    width: 100%;
    padding: 13px;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn:hover { background: #4f46e5; }
  .btn:active { transform: scale(0.98); }

  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🔐</span>
    <h1>License Server</h1>
    <p>Панель администратора</p>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div class="form-group">
      <label>Пароль администратора</label>
      <input type="password" name="password" placeholder="Введите пароль" autofocus required>
    </div>
    <button type="submit" class="btn">Войти</button>
  </form>
</div>
</body>
</html>
